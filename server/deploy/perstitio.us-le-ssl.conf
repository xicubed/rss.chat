<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName perstitio.us
    ServerAdmin mal@lotect.com
    DocumentRoot /var/www/html

    ErrorLog  ${APACHE_LOG_DIR}/perstitio.us-error.log
    CustomLog ${APACHE_LOG_DIR}/perstitio.us-access.log combined

    # rss.chat runs as a Node app on localhost. Apache terminates TLS and
    # reverse-proxies everything to it. Two backends: HTTP on 1420, websocket
    # (the firehose) on 1462.

    ProxyPreserveHost On

    # Keep ACME http-01 challenges local so certbot renewals keep working.
    ProxyPass /.well-known !

    # Route "Upgrade: websocket" requests to the websocket port.
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteCond %{REQUEST_URI} !^/\.well-known/ [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:1462/$1 [P,L]

    # Everything else to the app's HTTP port.
    ProxyPass / http://127.0.0.1:1420/
    ProxyPassReverse / http://127.0.0.1:1420/

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

SSLCertificateFile /etc/letsencrypt/live/perstitio.us/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/perstitio.us/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
