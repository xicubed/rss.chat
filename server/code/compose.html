<!DOCTYPE html>
<html>
	<head>
		<title>Compose — AsciiDoc</title>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<style>
			* {
				box-sizing: border-box;
				}
			body {
				margin: 0;
				font-family: Ubuntu, system-ui, sans-serif;
				color: #0f1419;
				height: 100vh;
				display: flex;
				flex-direction: column;
				}
			.header {
				display: flex;
				align-items: center;
				gap: 12px;
				padding: 10px 16px;
				border-bottom: 1px solid #e1e8ed;
				flex-wrap: wrap;
				}
			.header a.brand {
				font-weight: bold;
				color: inherit;
				text-decoration: none;
				}
			.header .who {
				color: #657786;
				font-size: 13px;
				}
			.header input.title {
				flex: 1;
				min-width: 180px;
				font-size: 15px;
				font-family: inherit;
				padding: 6px 10px;
				border: 1px solid #e1e8ed;
				border-radius: 6px;
				}
			.header button {
				font-size: 14px;
				font-family: inherit;
				padding: 6px 14px;
				border: 1px solid #e1e8ed;
				border-radius: 6px;
				background: #fff;
				cursor: pointer;
				}
			.header button.primary {
				background: rgb(30, 104, 166);
				border-color: rgb(30, 104, 166);
				color: #fff;
				}
			.header button:disabled {
				opacity: .5;
				cursor: default;
				}
			.panes {
				flex: 1;
				display: flex;
				min-height: 0;
				}
			textarea.source {
				flex: 1;
				min-width: 0;
				border: none;
				outline: none;
				resize: none;
				padding: 16px;
				font-family: Monaco, Menlo, Consolas, "Courier New", monospace;
				font-size: 13px;
				line-height: 1.5;
				}
			.preview {
				flex: 1;
				min-width: 0;
				border-left: 1px solid #e1e8ed;
				padding: 16px 20px;
				overflow: auto;
				font-size: 16px;
				line-height: 1.4;
				}
			.preview pre {
				background: #f6f8fa;
				padding: 10px 12px;
				border-radius: 6px;
				overflow-x: auto;
				font-family: Monaco, Menlo, Consolas, "Courier New", monospace;
				font-size: 13px;
				line-height: 1.45;
				}
			.preview code {
				font-family: Monaco, Menlo, Consolas, "Courier New", monospace;
				font-size: 13px;
				}
			.preview table {
				border-collapse: collapse;
				margin: 10px 0;
				}
			.preview td, .preview th {
				border: 1px solid #e1e8ed;
				padding: 5px 10px;
				}
			.preview a {
				color: rgb(30, 104, 166);
				}
			.statusbar {
				padding: 7px 16px;
				border-top: 1px solid #e1e8ed;
				font-size: 13px;
				color: #657786;
				min-height: 32px;
				}
			.statusbar a {
				color: rgb(30, 104, 166);
				}
			.statusbar .error {
				color: #c0392b;
				}
			.signin {
				padding: 60px 20px;
				text-align: center;
				font-size: 16px;
				}
			@media (max-width: 720px) {
				.panes {
					flex-direction: column;
					}
				.preview {
					border-left: none;
					border-top: 1px solid #e1e8ed;
					}
				}
			</style>
		</head>
	<body>
		<div class="header">
			<a class="brand" href="/">&larr; timeline</a>
			<span class="who" id="idWho"></span>
			<input class="title" id="idTitle" type="text" placeholder="Title (optional — most posts don't have one)">
			<span id="idCrossPosts" style="display: flex; align-items: center; gap: 10px; font-size: 13px; color: #657786;"></span>
			<button id="idNew" title="Start a new post">New</button>
			<button id="idLoad" title="Load one of your AsciiDoc posts by id to edit it">Load&hellip;</button>
			<button class="primary" id="idPublish">Publish</button>
			</div>
		<div class="panes" id="idPanes">
			<textarea class="source" id="idSource" spellcheck="false" placeholder="Write AsciiDoc here — it renders on the right as you type.

*bold*, _italic_, https://example.com[a link]

[source,js]
----
const hello = &quot;world&quot;; // highlighted
----

Markdown-style ```lang fences work too. Ctrl/Cmd+Enter publishes."></textarea>
			<div class="preview" id="idPreview"></div>
			</div>
		<div class="statusbar" id="idStatus">Preview renders through the server &mdash; what you see is exactly what publishing produces, timeline and feed alike.</div>
		<script>
			const mem = JSON.parse (localStorage.rssNetworkMemory || "null");
			const crossPostTargets = [%crossPostTargets%]; //other rss.chat servers this composer can also post to; filled in by the server from config
			var currentId = undefined, renderSeq = 0, debounceTimer = undefined, flDirty = false;

			function el (id) {
				return (document.getElementById (id));
				}
			function setStatus (html, flError) {
				el ("idStatus").innerHTML = flError ? "<span class=\"error\">" + html + "</span>" : html;
				}
			function servercall (path, params, method, callback) { //params ride the query string, like the shipped client
				const qs = new URLSearchParams (Object.assign ({}, params, {emailaddress: mem.email, emailcode: mem.code}));
				fetch (path + "?" + qs.toString (), {method}) .then (function (response) {
					response.text () .then (function (text) {
						if (response.ok) {
							callback (undefined, JSON.parse (text));
							}
						else {
							callback ({message: text});
							}
						});
					}) .catch (function (err) {
					callback (err);
					});
				}
			function renderPreview () {
				const theText = el ("idSource").value;
				if (theText.trim ().length === 0) {
					el ("idPreview").innerHTML = "";
					return;
					}
				const seq = ++renderSeq;
				servercall ("/renderasciidoc", {asciidoctext: theText}, "POST", function (err, data) {
					if (seq !== renderSeq) { //a newer render is already in flight; drop this one
						return;
						}
					if (err) {
						setStatus (err.message, true);
						}
					else {
						el ("idPreview").innerHTML = data.html;
						if (theText.length > 6000) {
							setStatus ("Heads up: long post — very large posts can exceed the server's request-size limit.");
							}
						}
					});
				}
			function crossPostCreds (target, flForget) { //the user's account on the other server, remembered in this browser only
				var stored = JSON.parse (localStorage.crossPostCreds || "{}");
				if (flForget) {
					delete stored [target.url];
					localStorage.crossPostCreds = JSON.stringify (stored);
					return (undefined);
					}
				if (stored [target.url] === undefined) {
					const email = prompt ("Your email on " + target.name + ":");
					if (!email) {
						return (undefined);
						}
					const code = prompt ("Your " + target.name + " code (from that site's sign-in link or its localStorage):");
					if (!code) {
						return (undefined);
						}
					stored [target.url] = {email: email.trim (), code: code.trim ()};
					localStorage.crossPostCreds = JSON.stringify (stored);
					}
				return (stored [target.url]);
				}
			function remoteIdMap () { //which post over there mirrors which post here, per target, in this browser
				return (JSON.parse (localStorage.crossPostMap || "{}"));
				}
			function getRemoteId (target, localId) {
				const theMap = remoteIdMap ();
				return ((theMap [target.url] !== undefined) ? theMap [target.url] [localId] : undefined);
				}
			function setRemoteId (target, localId, remoteId) {
				const theMap = remoteIdMap ();
				if (theMap [target.url] === undefined) {
					theMap [target.url] = {};
					}
				if (remoteId === undefined) {
					delete theMap [target.url] [localId];
					}
				else {
					theMap [target.url] [localId] = remoteId;
					}
				localStorage.crossPostMap = JSON.stringify (theMap);
				}
			function crossPostTo (target, item, flRetry) { //same software over there: first time creates the post on their server, and we remember its id so later publishes update it
				const creds = crossPostCreds (target);
				if (creds === undefined) {
					setStatus (el ("idStatus").innerHTML + " &mdash; skipped " + target.name + " (no credentials).");
					return;
					}
				const postRec = {description: item.description};
				if (item.title !== undefined) {
					postRec.title = item.title;
					}
				if (item.markdowntext !== undefined) {
					postRec.markdowntext = item.markdowntext;
					}
				const remoteId = getRemoteId (target, item.id);
				var path = "newpost";
				if (remoteId !== undefined) {
					path = "updatepost";
					postRec.id = remoteId;
					}
				const qs = new URLSearchParams ({emailaddress: creds.email, emailcode: creds.code, jsontext: JSON.stringify (postRec)});
				fetch (target.url + path + "?" + qs.toString (), {method: "POST"}) .then (function (response) {
					response.text () .then (function (text) {
						if (response.ok) {
							const remoteItem = JSON.parse (text);
							if (remoteId === undefined) {
								setRemoteId (target, item.id, remoteItem.id);
								}
							setStatus (el ("idStatus").innerHTML + " &mdash; " + ((remoteId === undefined) ? "also on " : "updated on ") + "<a href=\"" + (remoteItem.guid || (target.url + "?id=" + remoteItem.id)) + "\" target=\"_blank\">" + target.name + "</a>");
							}
						else {
							if (text.indexOf ("authorization") !== -1) { //bad code -- forget it so the next try asks again
								crossPostCreds (target, true);
								}
							if ((remoteId !== undefined) && !flRetry && ((text.indexOf ("no item") !== -1) || (text.indexOf ("deleted") !== -1))) { //the mirrored post is gone over there -- recreate it
								setRemoteId (target, item.id, undefined);
								crossPostTo (target, item, true);
								return;
								}
							setStatus (el ("idStatus").innerHTML + " &mdash; <span class=\"error\">" + target.name + ": " + text + "</span>");
							}
						});
					}) .catch (function (err) {
					setStatus (el ("idStatus").innerHTML + " &mdash; <span class=\"error\">" + target.name + ": " + err.message + "</span>");
					});
				}
			function publish () {
				const theText = el ("idSource").value;
				if (theText.trim ().length === 0) {
					setStatus ("Nothing to publish.", true);
					return;
					}
				const postRec = {asciidoctext: theText};
				const theTitle = el ("idTitle").value.trim ();
				if (theTitle.length > 0) {
					postRec.title = theTitle;
					}
				var path = "/newpost";
				if (currentId !== undefined) {
					path = "/updatepost";
					postRec.id = currentId;
					}
				el ("idPublish").disabled = true;
				setStatus (currentId === undefined ? "Publishing&hellip;" : "Updating&hellip;");
				servercall (path, {jsontext: JSON.stringify (postRec)}, "POST", function (err, item) {
					el ("idPublish").disabled = false;
					if (err) {
						setStatus (err.message, true);
						}
					else {
						currentId = item.id;
						flDirty = false;
						el ("idPublish").textContent = "Update";
						setStatus ("Published: <a href=\"" + item.guid + "\" target=\"_blank\">" + item.guid + "</a> &mdash; further publishes update post " + item.id + ".");
						crossPostTargets.forEach (function (target) { //mirror to the checked servers: creates over there the first time, updates after (the browser remembers the remote id)
							const box = document.getElementById ("idCrossPost_" + target.url);
							if ((box !== null) && box.checked) {
								crossPostTo (target, item);
								}
							});
						}
					});
				}
			function startNew () {
				currentId = undefined;
				flDirty = false;
				el ("idSource").value = "";
				el ("idTitle").value = "";
				el ("idPreview").innerHTML = "";
				el ("idPublish").textContent = "Publish";
				setStatus ("New post.");
				}
			function loadPost () {
				var answer = prompt ("Post id (or paste its permalink):");
				if (!answer) {
					return;
					}
				const match = answer.match (/\d+/);
				if (!match) {
					setStatus ("That doesn't look like a post id.", true);
					return;
					}
				loadById (match [0]);
				}
			function loadById (id) {
				const guid = location.origin + "/?id=" + id;
				fetch ("/getitembyguid?guid=" + encodeURIComponent (guid)) .then (function (response) {
					response.text () .then (function (text) {
						if (!response.ok) {
							setStatus (text, true);
							return;
							}
						const item = JSON.parse (text);
						if (!item.asciidoctext) {
							setStatus ("Post " + id + " wasn't written in AsciiDoc, so there's no source to edit here.", true);
							return;
							}
						if (item.screenname !== mem.screenname) {
							setStatus ("Post " + id + " is by @" + item.screenname + " — you can only edit your own posts.", true);
							return;
							}
						currentId = item.id;
						flDirty = false;
						el ("idSource").value = item.asciidoctext;
						el ("idTitle").value = item.title || "";
						el ("idPublish").textContent = "Update";
						setStatus ("Editing post " + item.id + ".");
						renderPreview ();
						});
					});
				}

			if (!mem || !mem.email || !mem.code) {
				document.body.innerHTML = "<div class=\"signin\">You're not signed in. <a href=\"/\">Sign in on the timeline</a> first, then come back to /compose.</div>";
				}
			else {
				el ("idWho").textContent = "posting as @" + mem.screenname;
				crossPostTargets.forEach (function (target) { //a checkbox per other server this composer can also post to
					const label = document.createElement ("label");
					label.style.cssText = "display: flex; align-items: center; gap: 4px; cursor: pointer; white-space: nowrap;";
					const box = document.createElement ("input");
					box.type = "checkbox";
					box.id = "idCrossPost_" + target.url;
					box.checked = (localStorage ["crossPostOn_" + target.url] === "true");
					box.addEventListener ("change", function () {
						localStorage ["crossPostOn_" + target.url] = box.checked ? "true" : "false";
						});
					label.appendChild (box);
					label.appendChild (document.createTextNode ("also " + target.name));
					el ("idCrossPosts").appendChild (label);
					});
				el ("idSource").addEventListener ("input", function () {
					flDirty = true;
					clearTimeout (debounceTimer);
					debounceTimer = setTimeout (renderPreview, 600);
					});
				document.addEventListener ("keydown", function (ev) {
					if ((ev.metaKey || ev.ctrlKey) && (ev.key === "Enter")) {
						ev.preventDefault ();
						publish ();
						}
					});
				window.addEventListener ("beforeunload", function (ev) {
					if (flDirty) {
						ev.preventDefault ();
						}
					});
				el ("idPublish").addEventListener ("click", publish);
				el ("idNew").addEventListener ("click", startNew);
				el ("idLoad").addEventListener ("click", loadPost);
				const urlId = new URLSearchParams (location.search).get ("id"); //arriving from the timeline's edit button on an AsciiDoc post
				if (urlId !== null) {
					loadById (urlId);
					}
				}
			</script>
		</body>
	</html>
